# One-shot Job that runs load_replayer.py to replay the Alibaba trace.
# It reads alibaba_timeseries_full.csv from a PVC and scales the
# load-generator Deployment to match real trace CPU demand.
#
# Run with:  kubectl apply -f load-generator-job.yaml
# Monitor:   kubectl logs -n research-workload job/trace-replayer -f
apiVersion: batch/v1
kind: Job
metadata:
  name: trace-replayer
  namespace: research-workload
  labels:
    research: autoscaler
spec:
  backoffLimit: 0   # Don't retry on failure (data replay should be clean)
  template:
    spec:
      serviceAccountName: autoscaler-sa
      restartPolicy: Never

      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: data-pvc   # Mount your alibaba_timeseries_full.csv here

      containers:
        - name: replayer
          image: us-central1-docker.pkg.dev/research-autoscaler-2026/research/autoscaler:v1-fixed
          # ↑ Same image as autoscaler (load_replayer.py is included)

          command:
            - python
            - load_replayer.py
            - --csv
            - /data/alibaba_timeseries_full.csv
            - --app
            - app_0            # Change to a valid app_name from your dataset
            - --namespace
            - research-workload
            - --deployment
            - load-generator
            - --speed
            - "10.0"           # 10× faster: 2-hr trace runs in ~12 min
            - --log-file
            - /data/replay_log.csv

          envFrom:
            - configMapRef:
                name: autoscaler-config

          volumeMounts:
            - name: data-volume
              mountPath: /data

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
---
# PVC for Alibaba trace data CSV
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-pvc
  namespace: research-workload
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: standard-rwo
