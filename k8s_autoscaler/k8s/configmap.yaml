apiVersion: v1
kind: ConfigMap
metadata:
  name: autoscaler-config
  namespace: research-autoscaler
data:
  #  Target workload 
  TARGET_NAMESPACE:  "research-workload"
  TARGET_DEPLOYMENT: "load-generator"   # monitors stress-ng CPU (real signal)

  #  Scaling parameters 
  # CPU allocated per replica of the target Deployment (in vCPU cores)
  CPU_PER_REPLICA:  "0.1"
  MIN_REPLICAS:     "1"
  MAX_REPLICAS:     "10"
  # Safety over-provisioning margin (15% matches the SLA_TOL in research)
  SLA_TOLERANCE:    "0.15"

  #  Model directory (contains hybrid_model_ewc_er.keras + 3 .pkl scalers) ─
  MODEL_DIR:        "/model"
  HISTORY_LENGTH:   "24"     # 2-hour look-back (24 × 5-min steps)
  FORECAST_STEPS:   "6"      # 30-min horizon
  INTERVAL_SEC:     "300"    # 5-minute resolution

  #  Prometheus 
  # Adjust this URL to match your Prometheus service name
  PROMETHEUS_URL:   "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090"

  # ── Static features (MLP branch — workload characteristics)
  # Profile of a representative trace app (app_113, median cpu_demand ~312) so the
  # MLP branch operates in-distribution instead of at a far corner of the scaler.
  STATIC_GPU_REQUEST:    "0.286"
  STATIC_MEM_GIB:        "354.12"
  STATIC_RDMA:           "7.866"
  STATIC_HN_FRACTION:    "0.286"
  STATIC_INSTANCE_COUNT: "3.861"
  STATIC_MAX_PER_NODE:   "4.577"
  APP_ID:                "113"

  # ── Sim-to-real domain adapter (maps live cores onto the model's training mean)
  LIVE_REF_CPU:          "0.3"

  #  Misc
  DRY_RUN:  "false"
  LOG_FILE: "/var/log/autoscaler.log"
---
